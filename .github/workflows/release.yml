name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  JTREG_VERSION: "7.5.1+1"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install jtreg
        run: |
          JTREG_TAG_URL="jtreg-${JTREG_VERSION//+/%2B}"
          curl -fsSL \
            "https://github.com/openjdk/jtreg/releases/download/${JTREG_TAG_URL}/jtreg-${JTREG_VERSION}.tar.gz" \
            -o /tmp/jtreg.tar.gz
          mkdir -p /opt/jtreg
          tar -xzf /tmp/jtreg.tar.gz -C /opt/jtreg --strip-components=1
          echo "JT_HOME=/opt/jtreg" >> "$GITHUB_ENV"

      - name: Set project version
        run: |
          mvn --no-transfer-progress versions:set \
            -DnewVersion="${{ steps.version.outputs.VERSION }}" \
            -DgenerateBackupPoms=false

      - name: Build and test
        run: mvn --no-transfer-progress verify

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/Pack200-ex-openjdk-${{ steps.version.outputs.VERSION }}.jar
            target/Pack200-ex-openjdk-${{ steps.version.outputs.VERSION }}-sources.jar
